<!DOCTYPE html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Turbo2 — Video Models Price Matrix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bowlby+One+SC&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply saved theme before paint to avoid a flash
      try {
        if (localStorage.getItem('turbo2-theme') === 'light') {
          document.documentElement.classList.add('theme-light');
          document.documentElement.style.colorScheme = 'light';
        }
      } catch (e) {}
    </script>
  </head>
  <body class="bg-bg-primary text-fg-primary font-mono antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
